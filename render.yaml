services:
  - type: web
    name: focusflow-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false        # Set this manually in Render dashboard
      - key: GEMINI_API_KEY
        sync: false        # Set this manually in Render dashboard
      - key: FRONTEND_URL
        sync: false        # Set to your Netlify URL after deploy
